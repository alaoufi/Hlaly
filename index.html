<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2E7D32" />
  <title>حلالي — إدارة الحلال</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <!-- شاشة المصادقة -->
  <div id="auth" class="auth hidden"></div>

  <!-- التطبيق -->
  <div id="app" class="hidden">
    <header class="appbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="رجوع">‹</button>
      <h1 id="screenTitle">حلالي</h1>
      <button id="guideBtn" class="icon-btn" aria-label="دليل الاستخدام" title="دليل الاستخدام">ⓘ</button>
      <button id="signoutBtn" class="icon-btn" aria-label="خروج" title="تسجيل الخروج">⎋</button>
    </header>
    <main id="view"></main>
    <nav class="bottomnav" id="bottomnav"></nav>
  </div>

  <div id="loading" class="loading">… جارٍ التحميل</div>
  <div id="modalRoot"></div>
  <div id="confirmRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- إعدادات Supabase (عبّئ config.js بقيم مشروعك) -->
  <script src="config.js"></script>
  <script src="guide.js"></script>
  <script src="app.js"></script>
  <!-- تشغيل بدون إنترنت بعد أول فتح -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
