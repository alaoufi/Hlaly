name: بناء تطبيق أندرويد (APK)

# يبني نسخة APK محلّية (قاعدة بيانات على الجهاز، بلا إنترنت) ويرفعها كأثر (artifact).
on:
  workflow_dispatch:        # تشغيل يدوي من تبويب Actions
  push:
    branches: [ "claude/compassionate-hopper-JvjBM" ]
    paths:
      - "app.js"
      - "app.css"
      - "guide.js"
      - "local-db.js"
      - "index.local.html"
      - "capacitor.config.json"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: تهيئة Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تهيئة Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: تثبيت الاعتماديات
        run: npm install

      - name: تجميع ملفات الويب (www)
        run: npm run build:www

      - name: إضافة منصّة أندرويد
        run: npx cap add android

      - name: مزامنة Capacitor
        run: npx cap sync android

      - name: بناء APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: mrahi-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
