name: بناء تطبيق أندرويد (APK)

# يبني نسخة APK محلّية (قاعدة بيانات على الجهاز، بلا إنترنت) ويرفعها كأثر (artifact).
on:
  workflow_dispatch:        # تشغيل يدوي من تبويب Actions
  push:
    branches: [ "claude/compassionate-hopper-JvjBM" ]
    paths:
      - "app.js"
      - "app.css"
      - "guide.js"
      - "local-db.js"
      - "index.local.html"
      - "capacitor.config.json"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write   # لإنشاء الإصدار (Release) ورفع ملف APK كأصل عام

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: تهيئة Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تهيئة Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: تثبيت الاعتماديات
        run: npm install

      - name: تجميع ملفات الويب (www)
        run: npm run build:www

      - name: إضافة منصّة أندرويد
        run: npx cap add android

      - name: مزامنة Capacitor
        run: npx cap sync android

      - name: بناء APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: تجهيز ملف التنزيل
        run: cp android/app/build/outputs/apk/debug/app-debug.apk mrahi.apk

      - name: رفع ملف APK (أثر داخلي)
        uses: actions/upload-artifact@v4
        with:
          name: mrahi-app-debug
          path: mrahi.apk
          if-no-files-found: error

      - name: نشر إصدار برابط تنزيل مباشر
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: مراح — تطبيق أندرويد (أحدث نسخة)
          body: |
            تطبيق مراح لأندرويد. نزّل الملف **mrahi.apk** مباشرة من الأسفل وثبّته على جوالك.
            عند أول فتح يطلب اختيار: محلي (بلا إنترنت) أو مشترك (Supabase).
          files: mrahi.apk
