<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2E7D32" />
  <title>مراح — إدارة الحلال</title>
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <!-- شاشة المصادقة (غير مستخدمة في الوضع المحلي) -->
  <div id="auth" class="auth hidden"></div>

  <div id="app" class="hidden">
    <header class="appbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="رجوع">‹</button>
      <h1 id="screenTitle">مراح</h1>
      <button id="guideBtn" class="icon-btn" aria-label="دليل الاستخدام" title="دليل الاستخدام">ⓘ</button>
      <button id="signoutBtn" class="icon-btn hidden" aria-label="خروج" title="تسجيل الخروج">⎋</button>

    <main id="view"></main>
    <nav class="bottomnav" id="bottomnav"></nav>
  </div>

  <div id="loading" class="loading">… جارٍ التحميل</div>
  <div id="modalRoot"></div>
  <div id="confirmRoot"></div>

  <!-- مكتبة Supabase مُضمّنة (للوضع المشترك) + قاعدة بيانات محلية (للوضع المحلي) -->
  <script src="supabase.js"></script>
  <script src="local-db.js"></script>
  <script src="version.js"></script>
  <script>window.MRAH_APK = true;</script>
  <script src="guide.js"></script>
  <!-- ترخيص التفعيل (Ed25519 عبر tweetnacl) -->
  <script src="nacl.min.js"></script>
  <script src="license.js"></script>
  <script src="app.js"></script>
  <!-- تحديث المحتوى تلقائياً (OTA) دون إعادة تثبيت -->
  <script src="updater.js"></script>

</html>
